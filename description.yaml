# k3d_deploy_system / description.yaml
# Kind: SystemDescription（简单 k3d 部署系统, MVP 骨架）
apiVersion: native/v1
kind: SystemDescription
metadata:
  name: k3d_deploy_system
  package: com.github.friddle.k3d_deploy_system
  revision: 1
  submitter: { kind: Human, name: friddle }
spec:
  goal: 基于 k3d(docker 内 k3s) 部署/发布; 起集群 -> 应用 manifest -> canary-check
  type: release_system
  category: system
  authzMode: allow
  sub_types:
    - name: k3d
      gitAddress: github.com/friddle/k3d_deploy_system
      downloadUrl: ""
  behaviors:
    - create_cluster    # k3d cluster create
    - deploy            # kubectl apply manifest
    - canary_check      # 1 副本 -> 探活 -> 扩容
  behaviorRules:
    - 部署前确认镜像 digest; 失败回滚
  dependencies:
    - type: developer_system     # 需研发系统产出镜像
      required: true
    - type: environment
      required: true
  dataModel:
    entities: [ cluster, deployment, manifest ]
  dataPermissions:
    - object_type: agent
      id: "*"
      auth_mode: dynamic

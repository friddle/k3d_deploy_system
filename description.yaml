apiVersion: native/v1
kind: SystemDescription
metadata:
  name: k3d_deploy_system
  package: com.friddle.ainative.k3d_deploy_system
  revision: 2
  submitter: { kind: Human, name: friddle }
spec:
  goal: k3d 部署系统 — 基于 k3d(docker) 创建 K8s 集群并发布部署模板
  type: deploy_system
  category: system
  authzMode: allow
  subsystems:
    - role: docker
      impls: [docker-ce]
      default_impl: docker-ce
      required: true
      install:
        method: package
        packages: [docker-ce, docker-ce-cli, containerd.io]
        check: docker --version
    - role: k3d
      impls: [k3d-io]
      default_impl: k3d-io
      required: true
      depends_on: [docker]
      install:
        method: script
        script: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
        check: k3d version
    - role: kubectl
      impls: [kubectl]
      default_impl: kubectl
      required: false
      depends_on: [k3d]
      install:
        method: binary
        binary: kubectl
        url: https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl
        check: kubectl version --client
  behaviors:
    - CreateCluster
    - CreateRegistry
    - PublishTemplate
  behaviorRules:
    - 部署前检查 docker/k3d/kubectl 已安装
    - k3d cluster create 先检查已有集群
    - 模板发布走 git push
    - 失败回滚: k3d cluster delete
  dependencies:
    - type: environment
      required: true
    - type: git
      required: false
  dataPermissions:
    - object_type: instance
      id: "*"
      auth_mode: allow
